spring:
  application:
    name: inventory-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/arbitrier?currentSchema=inventory_service}
    username: ${SPRING_DATASOURCE_USERNAME:inventory_service}
    password: ${SPRING_DATASOURCE_PASSWORD:local-service-only}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: inventory_service
  flyway:
    locations: classpath:db/migration/platform,classpath:db/migration/inventory_service
    default-schema: inventory_service
    schemas: inventory_service
    validate-on-migrate: true
    clean-disabled: true

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
